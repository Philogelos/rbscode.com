<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Code Kits — The Tech Lab</title>

<style>
:root {
  --bg: linear-gradient(135deg, #f7f3ec, #e9e2ff);
  --card: #ffffff;
  --text: #2d2959;
  --subtle: #5a5a72;
  --border: #e4def7;
  --shadow: rgba(0,0,0,0.1);
  --shadow-hover: rgba(0,0,0,0.16);
  --accent: #5a3cc4;
}

body.dark {
  --bg: linear-gradient(135deg, #1e2030, #2c2f45);
  --card: #2a2d3c;
  --text: #e5eeff;
  --subtle: #a7b4d4;
  --border: #3d4154;
  --shadow: rgba(0,0,0,0.35);
  --shadow-hover: rgba(0,0,0,0.55);
  --accent: #8aa4ff;
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* WRAPPER */
.wrapper {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
}

.header p {
  color: var(--subtle);
}

/* HOME BUTTON */
.home-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  box-shadow: 0 4px 10px var(--shadow);
  transition: 0.25s;
}

.home-btn:hover {
  background: var(--accent);
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 6px 16px var(--shadow);
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 10px 24px var(--shadow-hover);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  color: var(--subtle);
  font-size: 0.95rem;
}

/* ICON */
.icon {
  font-size: 42px;
  margin-bottom: 10px;
}

/* DARK TOGGLE */
.toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>
<button class="toggle-btn" onclick="toggleMode()" id="modeToggle">🌙</button>

<div class="wrapper">

  <div class="header">
    <h1>Code Kits</h1>
    <p>Choose where to start. Use ready-made code, explore projects, and build faster.</p>
  </div>

  <div class="grid">

    <!-- CODEPEN LOGIN -->
    <a href="https://codepen.io" target="_blank">
      <div class="card">
        <div class="icon">🧑‍💻</div>
        <h3>CodePen</h3>
        <p>Sign in or create an account to start coding.</p>
      </div>
    </a>

    <!-- CLUB -->
    <a href="https://codepen.io/rbscodepen" target="_blank">
      <div class="card">
        <div class="icon">🧪</div>
        <h3>Coding Club</h3>
        <p>Weekly class projects and examples.</p>
      </div>
    </a>

    <!-- CAMP -->
    <a href="https://codepen.io/techlab-codecamp" target="_blank">
      <div class="card">
        <div class="icon">🚀</div>
        <h3>Coding Camp</h3>
        <p>Pesach camp projects and challenges.</p>
      </div>
    </a>

  </div>

</div>

<script>
/* DARK MODE */
document.addEventListener("DOMContentLoaded", () => {
  const savedMode = localStorage.getItem("techlab-theme");
  if (savedMode === "dark") {
    document.body.classList.add("dark");
    document.getElementById("modeToggle").textContent = "☀️";
  }
});

function toggleMode() {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("techlab-theme", isDark ? "dark" : "light");
  document.getElementById("modeToggle").textContent = isDark ? "☀️" : "🌙";
}

function goHome() {
  window.location.href = "index.html"; // adjust if needed
}
</script>

</body>
</html>
