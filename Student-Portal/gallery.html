<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Image Gallery — The Tech Lab</title>

<style>
:root {
  --bg: linear-gradient(135deg, #f7f3ec, #e9e2ff);
  --card: #ffffff;
  --text: #2d2959;
  --subtle: #666;
  --border: #e4def7;
  --shadow: rgba(0,0,0,0.12);
  --accent: #5a3cc4;
}

body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.wrapper {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

p {
  text-align: center;
  color: var(--subtle);
  max-width: 700px;
  margin: 10px auto 40px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 6px 16px var(--shadow);
  overflow: hidden;
}

/* IMAGE PREVIEW */
.thumb {
  height: 160px;
  background: #f3f3f3;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* META */
.meta {
  padding: 12px;
  font-size: 13px;
  line-height: 1.5;
}

.meta div {
  color: var(--subtle);
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 8px;
  padding: 12px;
}

button {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
  cursor: pointer;
}

.copy-btn {
  background: var(--accent);
  color: white;
}

.download-btn {
  background: #eee;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal img {
  max-width: 92vw;
  max-height: 92vh;
  background: white;
  border-radius: 10px;
}

.modal.show {
  display: flex;
}

.library-nav {
  text-align: center;
  margin-bottom: 30px;
  position: sticky;
  top: 0; 
  /* background-color: #2d29594d; */
}

.library-nav button {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 18px;
  margin: 4px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.library-nav button:hover {
  background: var(--accent);
  color: white;
}
</style>
</head>

<script>

const BASE_URL = "https://rbscode.com/Student-Portal/images/";
const NUM_IMAGES = 26; // change this only

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

/* ===== AUDIO CONFIG ===== */
const SND_BASE = "https://rbscode.com/Student-Portal/snd/";

/* old sounds array without images

  { number: 1, name: "Zap SFX" },

*/
const sounds = [
  { number: 1, name: "Zap SFX", img: "zap.png" },
  { number: 2, name: "Coin Pickup", img: "coin.png" },
  { number: 3, name: "Laser Shot", img: "laser.png" },

  { number: 4, name: "Rocket Launch", img: "rocket.png" },
  { number: 5, name: "Jet Flyby", img: "jet.png" },
  { number: 6, name: "F1 Car Engine", img: "f1.png" },
];


/* ===== BUILD GALLERY ===== */
for (let i = 1; i <= NUM_IMAGES; i++) {
  const src = `images/${i}.png`;
  const fullUrl = BASE_URL + `${i}.png`;

  const card = document.createElement("div");
  card.className = "card";

  const thumb = document.createElement("div");
  thumb.className = "thumb";

  const img = document.createElement("img");
  img.src = src;

  img.onload = () => {
    const w = img.naturalWidth;
    const h = img.naturalHeight;
    meta.innerHTML += `
      <div>Size: ${w} × ${h}</div>
      <div>Aspect ratio: ${getRatio(w, h)}</div>
    `;
  };

  img.onclick = () => {
    modalImg.src = src;
    modal.classList.add("show");
  };

  thumb.appendChild(img);

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML = `<div>images/${i}.png</div>`;

  const actions = document.createElement("div");
  actions.className = "actions";

  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "Copy link";
  copyBtn.onclick = () => copyText(fullUrl, copyBtn);

  const downloadBtn = document.createElement("button");
  downloadBtn.className = "download-btn";
  downloadBtn.textContent = "Download";
  downloadBtn.onclick = () => download(src);

  actions.appendChild(copyBtn);
  actions.appendChild(downloadBtn);

  card.appendChild(thumb);
  card.appendChild(meta);
  card.appendChild(actions);
  gallery.appendChild(card);
}

/* ===== BUILD AUDIO ===== */
const audioGallery = document.getElementById("audioGallery");

for (let s of sounds) {

  const src = `snd/${s.number}.mp3`;
  const fullUrl = SND_BASE + `${s.number}.mp3`;

  const card = document.createElement("div");
  card.className = "card";

  /* preview area */
  const thumb = document.createElement("div");
  thumb.className = "thumb";

  /* sound image */
  const img = document.createElement("img");
  img.src = `images/audio/${s.img}`;
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.objectFit = "cover";

  thumb.appendChild(img);

  /* audio player */
  const audio = document.createElement("audio");
  audio.controls = true;
  audio.src = src;
  audio.style.width = "100%";
  audio.style.marginTop = "6px";

  /* meta */
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML = `
    <div>${s.name}</div>
    <div>snd/${s.number}.mp3</div>
  `;

  /* actions */
  const actions = document.createElement("div");
  actions.className = "actions";

  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "Copy link";
  copyBtn.onclick = () => copyText(fullUrl, copyBtn);

  const downloadBtn = document.createElement("button");
  downloadBtn.className = "download-btn";
  downloadBtn.textContent = "Download";
  downloadBtn.onclick = () => download(src);

  actions.appendChild(copyBtn);
  actions.appendChild(downloadBtn);

  card.appendChild(thumb);
  card.appendChild(audio);
  card.appendChild(meta);
  card.appendChild(actions);

  audioGallery.appendChild(card);
}

/* ===== HELPERS ===== */
function copyText(text, btn) {
  navigator.clipboard.writeText(text);
  btn.textContent = "Copied!";
  setTimeout(() => btn.textContent = "Copy link", 1200);
}

function download(src) {
  const a = document.createElement("a");
  a.href = src;
  a.download = src.split("/").pop();
  a.click();
}

function getRatio(w, h) {
  const r = w / h;

  const standards = [
    { label: "1:1", value: 1 / 1 },
    { label: "16:9", value: 16 / 9 },
    { label: "15:8", value: 15 / 8 },
    { label: "3:2", value: 3 / 2 },
    { label: "4:3", value: 4 / 3 },
    { label: "3:4", value: 3 / 4 },
    { label: "2:3", value: 2 / 3 },
    { label: "9:16", value: 9 / 16 },
  ];

  const TOL = 0.03; // 3% tolerance

  for (let s of standards) {
    if (Math.abs(r - s.value) < TOL) {
      return s.label;
    }
  }

  // fallback: exact reduced ratio
  function gcd(a, b) {
    return b === 0 ? a : gcd(b, a % b);
  }

  const d = gcd(w, h);
  return `${w / d}:${h / d}`;
}
